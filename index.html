<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barbara's Biolink</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      margin: 0;
      font-family: Arial, sans-serif;
      color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 1100px; /* Más ancho para monitores grandes */
      padding: 0 24px 40px;
    }

    .cover {
      width: 100%;
      height: 320px;
      background-color: #000000;
      position: relative;
    }

    .profile-pic {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top;
      border: 5px solid #000000;
      background-color: #000;
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translate(-50%, -50%);
      z-index: 5;
    }

    .info {
      margin-top: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: justify;
    }

    .title {
      font-size: 26px;
      color: #000000;
      margin: -10px 0 0;
      text-align: center;
    }

    .subtitle-center {
      font-size: 12px;
      color: #000000;
      margin: 6px 0 14px;
      text-align: center;
    }

    .small-text {
      font-size: 14px;
      color: #000000;
      text-align: justify;
      margin: 0;
      max-width: 800px;
    }

    .link-bio {
      font-size: 14px;
      color: #000000;
      text-align: center;
      margin-top: 12px;
    }

    .link-bio a {
      color: #000000;
      text-decoration: none;
      font-weight: bold;
    }

    /* TABLETS */
    @media (max-width: 768px) {
      .container {
        padding: 0 16px 30px;
      }

      .cover {
        height: 260px;
      }

      .profile-pic {
        width: 150px;
        height: 150px;
      }

      .title {
        font-size: 22px;
      }

      .subtitle-center {
        font-size: 10px;
      }

      .small-text,
      .link-bio {
        font-size: 12px;
      }
    }

    /* CELULARES */
    @media (max-width: 480px) {
      .cover {
        height: 220px;
      }

      .profile-pic {
        width: 120px;
        height: 120px;
      }

      .title {
        font-size: 20px;
      }

      .subtitle-center {
        font-size: 9px;
      }

      .small-text,
      .link-bio {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="cover">
      <img
        src="https://i.postimg.cc/Bvf9wSfq/1000134502.jpg"
        alt="Foto de perfil"
        class="profile-pic"
      />
    </div>

    <div class="info">
      <h1 class="title">María Barbara Zavala</h1>
      <h2 class="subtitle-center">Mi blog personal</h2>
      <h3 class="small-text">
        Licenciada en administración, gestión empresarial y liderazgo sistémico. Lectora. Piscis. Me gusta escribir. Maestra en artes ocultas. Filosofía, mentalidad, conocimiento. Mis blog's y mis colecciones:
      </h3>
      <div class="link-bio">
        🔗 <a href="https://bio.site/xblacknoirfoliombz" target="_blank">bio.site/mariabarbarazav</a>
      </div>
    </div>
  </div>
</body>
</html>
